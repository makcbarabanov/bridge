<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOM — Найди свою цель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            color: #1a1a1a;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .progress-dot {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: linear-gradient(90deg, #7e22ce, #2a5298);
        }

        .question-number {
            color: #7e22ce;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .answer {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .answer:focus {
            border-color: #7e22ce;
            box-shadow: 0 0 0 4px rgba(126, 34, 206, 0.1);
        }

        .buttons {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7e22ce 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(126, 34, 206, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .completion {
            text-align: center;
        }

        .completion h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #7e22ce;
        }

        .completion p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #666;
        }

        .result-box {
            background: #f8f9ff;
            padding: 30px;
            border-radius: 16px;
            margin: 30px 0;
            border-left: 4px solid #7e22ce;
        }

        .result-box h3 {
            color: #7e22ce;
            margin-bottom: 15px;
        }

        .result-box p {
            color: #1a1a1a;
            font-size: 16px;
            line-height: 1.6;
        }

        .export-btn {
            background: #43e97b;
            color: white;
            margin-top: 20px;
        }

        .export-btn:hover {
            background: #38d66c;
        }

        .intro {
            text-align: center;
        }

        .intro h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #7e22ce 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        .auth-input:focus {
            border-color: #7e22ce;
            box-shadow: 0 0 0 4px rgba(126, 34, 206, 0.1);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #7e22ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
        // === КОНФИГУРАЦИЯ ===
        const API_URL = 'http://localhost:8080';
        const QUESTIONS = [
            "Что для тебя по-настоящему важно в жизни прямо сейчас?",
            "Если бы у тебя было неограниченное время и ресурсы, чем бы ты занимался?",
            "Чего ты боишься больше всего?",
            "Что бы ты сделал, если бы точно знал, что не провалишься?",
            "Каким человеком ты хочешь быть через год?",
            "Что ты хочешь, чтобы о тебе говорили люди?",
            "Какую проблему в мире ты хотел бы решить?",
            "Что делает тебя по-настоящему счастливым?",
            "Если бы тебе осталось жить год, как бы ты его прожил?",
            "Что ты откладываешь уже долгое время?"
        ];

        // === СОСТОЯНИЕ ===
        let state = {
            user: null,
            userId: null,
            currentQuestion: -1,
            answers: {},
            startTime: null,
            questionStartTime: null,
            isAuthenticated: false
        };

        // === API ФУНКЦИИ ===
        async function apiGet(endpoint) {
            const response = await fetch(`${API_URL}${endpoint}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }

        async function apiPost(endpoint, data) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }

        async function getUserByTelegramId(telegramId) {
            const result = await apiGet(`/tables/users?where.telegram_id=${telegramId}`);
            return result.rows && result.rows.length > 0 ? result.rows[0] : null;
        }

        async function saveAnswer(questionNumber, questionText, answer, timeSpent) {
            return await apiPost('/tables/bloom_questionnaire_responses', {
                user_id: state.userId,
                question_number: questionNumber + 1,
                question_text: questionText,
                answer: answer,
                time_spent_seconds: Math.floor(timeSpent / 1000)
            });
        }

        async function completeQuestionnaire(totalTime) {
            return await apiPost('/tables/bloom_questionnaire_completions', {
                user_id: state.userId,
                total_time_seconds: Math.floor(totalTime / 1000),
                device_info: navigator.userAgent,
                browser_info: navigator.platform
            });
        }

        async function loadProgress() {
            const result = await apiGet(`/tables/bloom_questionnaire_responses?where.user_id=${state.userId}`);
            const responses = result.rows || [];
            
            responses.forEach(r => {
                state.answers[r.question_number - 1] = r.answer;
            });

            if (responses.length > 0) {
                state.currentQuestion = Math.max(...responses.map(r => r.question_number - 1));
                if (state.currentQuestion < QUESTIONS.length - 1) {
                    state.currentQuestion++;
                } else {
                    state.currentQuestion = QUESTIONS.length; // Completed
                }
            } else {
                state.currentQuestion = -1; // Start from intro
            }
        }

        // === UI ФУНКЦИИ ===
        function render() {
            const app = document.getElementById('app');
            
            if (!state.isAuthenticated) {
                renderAuth();
            } else if (state.currentQuestion === -1) {
                renderIntro();
            } else if (state.currentQuestion < QUESTIONS.length) {
                renderQuestion();
            } else {
                renderCompletion();
            }
        }

        function renderAuth() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="intro">
                    <h1>🌸 BLOOM</h1>
                    <p>AI-помощник в поиске твоей цели</p>
                    <p style="font-size: 16px; color: #999; margin-bottom: 30px;">
                        Для начала, укажи свой Telegram ID
                    </p>
                    <input 
                        type="text" 
                        class="auth-input" 
                        id="telegramIdInput" 
                        placeholder="Telegram ID (например: 7547064948)"
                        autofocus
                    />
                    <div id="authMessage"></div>
                    <button class="btn btn-primary" onclick="authenticate()" style="width: 100%;">
                        Войти →
                    </button>
                    <p style="margin-top: 20px; font-size: 14px; color: #999;">
                        Не знаешь свой Telegram ID?<br>
                        Напиши боту <strong>@userinfobot</strong> в Telegram
                    </p>
                </div>
            `;
        }

        async function authenticate() {
            const input = document.getElementById('telegramIdInput');
            const messageDiv = document.getElementById('authMessage');
            const telegramId = input.value.trim();

            if (!telegramId || isNaN(telegramId)) {
                messageDiv.innerHTML = '<div class="error-message">Введи корректный Telegram ID (только цифры)</div>';
                return;
            }

            try {
                messageDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
                
                const user = await getUserByTelegramId(parseInt(telegramId));
                
                if (!user) {
                    messageDiv.innerHTML = '<div class="error-message">Пользователь не найден. Убедись, что ты зарегистрирован в системе марафона.</div>';
                    return;
                }

                state.user = user;
                state.userId = user.id;
                state.isAuthenticated = true;

                // Загружаем прогресс
                await loadProgress();
                
                render();
            } catch (error) {
                console.error(error);
                messageDiv.innerHTML = '<div class="error-message">Ошибка подключения к серверу. Проверь, что API сервер запущен.</div>';
            }
        }

        function renderIntro() {
            const app = document.getElementById('app');
            const name = state.user.name || state.user.surname || 'друг';
            
            app.innerHTML = `
                <div class="intro">
                    <h1>🌸 BLOOM</h1>
                    <p>
                        Привет, <strong>${name}</strong>! Я — Bloom, AI-помощник в поиске твоей цели.
                    </p>
                    <p>
                        Я задам тебе <strong>${QUESTIONS.length} глубоких вопросов</strong>.<br>
                        Отвечай честно, не спеши.<br>
                        В конце мы вместе сформулируем твою цель.
                    </p>
                    <p style="margin-top: 30px; font-size: 16px; color: #999;">
                        ⏱️ Это займёт ~10-15 минут<br>
                        💾 Ответы сохраняются на сервере автоматически<br>
                        🔄 Можешь вернуться в любой момент
                    </p>
                    <button class="btn btn-primary" onclick="start()" style="margin-top: 40px; width: 100%;">
                        Начать поиск цели →
                    </button>
                </div>
            `;
        }

        function renderQuestion() {
            const app = document.getElementById('app');
            const progress = QUESTIONS.map((_, i) => 
                `<div class="progress-dot ${i <= state.currentQuestion ? 'active' : ''}"></div>`
            ).join('');
            
            app.innerHTML = `
                <div class="progress">${progress}</div>
                <div class="question-number">Вопрос ${state.currentQuestion + 1} из ${QUESTIONS.length}</div>
                <div class="question">${QUESTIONS[state.currentQuestion]}</div>
                <textarea 
                    class="answer" 
                    id="answerInput"
                    placeholder="Напиши свой ответ здесь..."
                    autofocus
                >${state.answers[state.currentQuestion] || ''}</textarea>
                <div id="saveStatus" style="text-align: center; margin-bottom: 10px; color: #999; font-size: 14px;"></div>
                <div class="buttons">
                    ${state.currentQuestion > 0 ? '<button class="btn btn-secondary" onclick="prev()">← Назад</button>' : '<div></div>'}
                    <button class="btn btn-primary" onclick="next()" id="nextBtn">
                        ${state.currentQuestion === QUESTIONS.length - 1 ? 'Завершить →' : 'Далее →'}
                    </button>
                </div>
            `;
            
            const textarea = document.getElementById('answerInput');
            textarea.addEventListener('input', () => {
                state.answers[state.currentQuestion] = textarea.value;
                updateNextButton();
            });
            
            updateNextButton();
        }

        function renderCompletion() {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="completion">
                    <h2>🎉 Поздравляю!</h2>
                    <p>Ты прошёл весь путь самопознания!</p>
                    
                    <div class="result-box">
                        <h3>✅ Твои ответы сохранены</h3>
                        <p>
                            Теперь я проанализирую их и дам тебе подробный фидбек.<br>
                            Скоро здесь появится твой персональный план! 💚
                        </p>
                    </div>

                    <div class="result-box">
                        <h3>📋 Что дальше?</h3>
                        <p>
                            Твои ответы сохранены в базе данных.<br>
                            Макс (администратор) получит доступ к ним и сможет дать более глубокий анализ.<br>
                            <br>
                            <strong>Ты первый тестер проекта BLOOM! 🎖️</strong>
                        </p>
                    </div>

                    <p style="margin-top: 40px; font-size: 16px; color: #666;">
                        Спасибо за участие в тестировании! 🙏
                    </p>
                </div>
            `;
        }

        function updateNextButton() {
            const btn = document.getElementById('nextBtn');
            const input = document.getElementById('answerInput');
            if (btn && input) {
                btn.disabled = input.value.trim().length < 1;
            }
        }

        function start() {
            state.currentQuestion = 0;
            state.startTime = Date.now();
            state.questionStartTime = Date.now();
            render();
        }

        async function next() {
            const input = document.getElementById('answerInput');
            const statusDiv = document.getElementById('saveStatus');
            
            if (!input || input.value.trim().length < 1) return;

            const answer = input.value.trim();
            const timeSpent = Date.now() - state.questionStartTime;

            try {
                statusDiv.innerHTML = '💾 Сохраняю...';
                
                await saveAnswer(
                    state.currentQuestion,
                    QUESTIONS[state.currentQuestion],
                    answer,
                    timeSpent
                );

                state.answers[state.currentQuestion] = answer;
                
                statusDiv.innerHTML = '✅ Сохранено!';
                
                setTimeout(() => {
                    state.currentQuestion++;
                    
                    if (state.currentQuestion >= QUESTIONS.length) {
                        const totalTime = Date.now() - state.startTime;
                        completeQuestionnaire(totalTime).then(() => {
                            render();
                        });
                    } else {
                        state.questionStartTime = Date.now();
                        render();
                    }
                }, 500);
                
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '❌ Ошибка сохранения. Попробуй ещё раз.';
            }
        }

        function prev() {
            if (state.currentQuestion > 0) {
                state.currentQuestion--;
                state.questionStartTime = Date.now();
                render();
            }
        }

        // === ИНИЦИАЛИЗАЦИЯ ===
        window.authenticate = authenticate;
        window.start = start;
        window.next = next;
        window.prev = prev;

        // Проверяем подключение к API при загрузке
        (async () => {
            try {
                await apiGet('/health');
                render();
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="error-message">
                        ⚠️ Не удалось подключиться к серверу.<br>
                        Убедись, что API сервер запущен на ${API_URL}
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
