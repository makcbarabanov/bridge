<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOM — Найди свою цель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            color: #1a1a1a;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .progress-dot {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: linear-gradient(90deg, #7e22ce, #2a5298);
        }

        .question-number {
            color: #7e22ce;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .answer {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .answer:focus {
            border-color: #7e22ce;
            box-shadow: 0 0 0 4px rgba(126, 34, 206, 0.1);
        }

        .buttons {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7e22ce 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(126, 34, 206, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .completion {
            text-align: center;
        }

        .completion h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #7e22ce;
        }

        .completion p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #666;
        }

        .result-box {
            background: #f8f9ff;
            padding: 30px;
            border-radius: 16px;
            margin: 30px 0;
            border-left: 4px solid #7e22ce;
        }

        .result-box h3 {
            color: #7e22ce;
            margin-bottom: 15px;
        }

        .result-box p {
            color: #1a1a1a;
            font-size: 16px;
            line-height: 1.6;
        }

        .export-btn {
            background: #43e97b;
            color: white;
            margin-top: 20px;
        }

        .export-btn:hover {
            background: #38d66c;
        }

        .intro {
            text-align: center;
        }

        .intro h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #7e22ce 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="app">
            <!-- Контент генерируется JS -->
        </div>
    </div>

    <script>
        const questions = [
            "Что для тебя по-настоящему важно в жизни прямо сейчас?",
            "Если бы у тебя было неограниченное время и ресурсы, чем бы ты занимался?",
            "Чего ты боишься больше всего?",
            "Что бы ты сделал, если бы точно знал, что не провалишься?",
            "Каким человеком ты хочешь быть через год?",
            "Что ты хочешь, чтобы о тебе говорили люди?",
            "Какую проблему в мире ты хотел бы решить?",
            "Что делает тебя по-настоящему счастливым?",
            "Если бы тебе осталось жить год, как бы ты его прожил?",
            "Что ты откладываешь уже долгое время?",
            "Какой след ты хочешь оставить в этом мире?",
            "Что бы ты посоветовал себе 10 лет назад?",
            "Что тебя вдохновляет и заряжает энергией?",
            "От чего ты готов отказаться ради своей цели?",
            "Как ты поймёшь, что достиг успеха?",
            "Что мешает тебе начать прямо сейчас?",
            "Какие у тебя есть сильные стороны?",
            "Кто те люди, которых ты хочешь сделать счастливее?",
            "Что ты будешь чувствовать, когда достигнешь своей цели?",
            "Какой первый шаг ты можешь сделать уже сегодня?"
        ];

        let currentQuestion = -1; // -1 = intro
        let answers = JSON.parse(localStorage.getItem('bloom_answers') || '{}');

        function render() {
            const app = document.getElementById('app');
            
            if (currentQuestion === -1) {
                // Intro screen
                app.innerHTML = `
                    <div class="intro">
                        <h1>🌸 BLOOM</h1>
                        <p>
                            Привет! Я — Bloom, AI-помощник в поиске твоей цели.
                        </p>
                        <p>
                            Я задам тебе <strong>20 глубоких вопросов</strong>.<br>
                            Отвечай честно, не спеши.<br>
                            В конце мы вместе сформулируем твою цель.
                        </p>
                        <p style="margin-top: 30px; font-size: 16px; color: #999;">
                            ⏱️ Это займёт ~15-20 минут<br>
                            💾 Ответы сохраняются автоматически
                        </p>
                        <button class="btn btn-primary" onclick="start()" style="margin-top: 40px; width: 100%;">
                            Начать поиск цели →
                        </button>
                    </div>
                `;
            } else if (currentQuestion < questions.length) {
                // Question screen
                const progress = questions.map((_, i) => 
                    `<div class="progress-dot ${i <= currentQuestion ? 'active' : ''}"></div>`
                ).join('');
                
                app.innerHTML = `
                    <div class="progress">${progress}</div>
                    <div class="question-number">Вопрос ${currentQuestion + 1} из ${questions.length}</div>
                    <div class="question">${questions[currentQuestion]}</div>
                    <textarea 
                        class="answer" 
                        id="answerInput"
                        placeholder="Напиши свой ответ здесь..."
                        autofocus
                    >${answers[currentQuestion] || ''}</textarea>
                    <div class="buttons">
                        ${currentQuestion > 0 ? '<button class="btn btn-secondary" onclick="prev()">← Назад</button>' : '<div></div>'}
                        <button class="btn btn-primary" onclick="next()" id="nextBtn">
                            ${currentQuestion === questions.length - 1 ? 'Завершить →' : 'Далее →'}
                        </button>
                    </div>
                `;
                
                // Auto-save on input
                const textarea = document.getElementById('answerInput');
                textarea.addEventListener('input', () => {
                    answers[currentQuestion] = textarea.value;
                    localStorage.setItem('bloom_answers', JSON.stringify(answers));
                    updateNextButton();
                });
                
                updateNextButton();
            } else {
                // Completion screen
                showResults();
            }
        }

        function updateNextButton() {
            const btn = document.getElementById('nextBtn');
            const input = document.getElementById('answerInput');
            if (btn && input) {
                btn.disabled = input.value.trim().length < 1; // Минимум 1 символ
            }
        }

        function start() {
            currentQuestion = 0;
            render();
        }

        function next() {
            const input = document.getElementById('answerInput');
            if (input && input.value.trim().length >= 1) {
                answers[currentQuestion] = input.value;
                localStorage.setItem('bloom_answers', JSON.stringify(answers));
                currentQuestion++;
                render();
            }
        }

        function prev() {
            if (currentQuestion > 0) {
                currentQuestion--;
                render();
            }
        }

        function showResults() {
            // Анализ ответов
            const allAnswers = Object.values(answers).join(' ').toLowerCase();
            
            // Простой анализ ключевых слов
            const keywords = {
                'здоровье': ['здоровье', 'спорт', 'зарядка', 'бег', 'тренировка', 'похудеть'],
                'семья': ['семья', 'дети', 'жена', 'муж', 'родители', 'отношения'],
                'карьера': ['работа', 'карьера', 'бизнес', 'компания', 'проект', 'стартап'],
                'творчество': ['писать', 'рисовать', 'музыка', 'творчество', 'искусство'],
                'обучение': ['учиться', 'курс', 'навык', 'знание', 'образование', 'программирование']
            };
            
            let topCategory = 'развитие';
            let maxCount = 0;
            
            Object.entries(keywords).forEach(([category, words]) => {
                const count = words.filter(word => allAnswers.includes(word)).length;
                if (count > maxCount) {
                    maxCount = count;
                    topCategory = category;
                }
            });

            app.innerHTML = `
                <div class="completion">
                    <h2>🎉 Поздравляю!</h2>
                    <p>Ты прошёл весь путь самопознания!</p>
                    
                    <div class="result-box">
                        <h3>🎯 Твоя сфера интересов:</h3>
                        <p><strong>${topCategory.toUpperCase()}</strong></p>
                    </div>
                    
                    <div class="result-box">
                        <h3>💡 Что я заметил в твоих ответах:</h3>
                        <p>
                            Ты упомянул страх ${Object.keys(answers).length} раз, но также говорил о желании измениться.
                            Это значит ты готов к действию! 💪
                        </p>
                    </div>

                    <div class="result-box">
                        <h3>📋 Следующий шаг:</h3>
                        <p>
                            На основе твоих ответов я рекомендую сформулировать конкретную цель в сфере <strong>"${topCategory}"</strong>.
                            <br><br>
                            Например:
                            <br>• "Пробежать марафон за 6 месяцев"
                            <br>• "Написать книгу за год"
                            <br>• "Создать своё приложение за 30 дней"
                        </p>
                    </div>

                    <p style="margin-top: 40px; font-size: 16px; color: #666;">
                        💾 Твои ответы сохранены в браузере<br>
                        📧 Скоро здесь будет кнопка "Создать мой план"
                    </p>

                    <button class="btn btn-primary export-btn" onclick="exportAnswers()" style="width: 100%;">
                        📥 Скачать мои ответы
                    </button>

                    <button class="btn btn-secondary" onclick="restart()" style="width: 100%; margin-top: 16px;">
                        🔄 Начать заново
                    </button>
                </div>
            `;
        }

        function exportAnswers() {
            const text = questions.map((q, i) => 
                `ВОПРОС ${i + 1}: ${q}\n\nОТВЕТ: ${answers[i] || '(пропущено)'}\n\n---\n\n`
            ).join('');
            
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bloom_answers_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
        }

        function restart() {
            if (confirm('Ты уверен? Все ответы будут удалены.')) {
                localStorage.removeItem('bloom_answers');
                answers = {};
                currentQuestion = -1;
                render();
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
